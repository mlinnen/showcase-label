name: Build and Release

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    
    strategy:
      matrix:
        runtime: [win-x64, win-x86, win-arm64]

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore src/ShowcaseLabel/ShowcaseLabel.csproj

    - name: Publish
      run: >
        dotnet publish src/ShowcaseLabel/ShowcaseLabel.csproj
        -c Release
        -r ${{ matrix.runtime }}
        --self-contained false
        -p:PublishSingleFile=true
        -p:IncludeNativeLibrariesForSelfExtract=true
        -o ./publish/${{ matrix.runtime }}

    - name: Zip Artifacts
      shell: pwsh
      run: |
        Compress-Archive -Path "./publish/${{ matrix.runtime }}/*" -DestinationPath "./ShowcaseLabel-${{ matrix.runtime }}.zip"

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ShowcaseLabel-${{ matrix.runtime }}
        path: ./ShowcaseLabel-${{ matrix.runtime }}.zip

  release:
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs: build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
        pattern: ShowcaseLabel-*
        merge-multiple: true

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v1.0.${{ github.run_number }}
        name: Release v1.0.${{ github.run_number }}
        files: artifacts/*.zip
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
